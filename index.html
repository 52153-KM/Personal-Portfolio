<DOCTYPE html>
    <html>

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width-device-width, initial-scale=1.0" />
        <title>Kavin Muller's Portfolio</title>
        <script src="index.js" defer></script>
    </head>

    <body>
        <header>
            <b>Kavin Muller's Portfolio</b>
        </header>
        <main>
            <section id="social-links">
                <h3>GitHub: </h3>
                <a href="https://github.com/52153-KM" target="_blank">
                    <button>Visit GitHub Profile</button>
                </a>
                <h3>LinkedIn: </h3>
                <a href="https://www.linkedin.com/in/kavin-muller-b402371ab" target="_blank">
                    <button>Visit LinkedIn Profile</button>
                </a>
            </section>

            <section id="personal-info">
                <div class="bio">
                    <img src="images/KM Photo.jpg" alt="Headshot" width="200" height="200" />
                    <p>Kavin Muller is a software developer with experience in web development, database management, and
                        system design. He is passionate about creating efficient and scalable applications.</p>
                </div>
            </section>

            <section id = "personalProjects">
                <h3>Personal Projects</h3>
                <div id = "projects"></div>
            </section>

            <section id="contact">
                <form method="POST">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="first-name">First Name</label>
                            <input id="first-name" type="text" placeholder="Enter your first name" required/>
                        </div>
                        <div class="input-group">
                            <label for="last-name">Last Name</label>
                            <input id="last-name" type="text" placeholder="Enter your last name" required/>
                        </div>
                        </div>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="subject">Subject</label>
                            <select id="subject">
                                <option value="inquiry" selected>Buissness Inquiry</option>
                                <option value="feedback">Feedback</option>
                                <option value="general">General Question</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input id="email" type="email" placeholder="Enter your email" required/>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="message">Message</label>
                        <textarea 
                            id="message" 
                            name="message" 
                            placeholder="Enter your message" 
                            required
                        ></textarea>
                    </div>
                    <button>Contact Me</button>
                </form>
            </section>        
        </main>
        <footer>
            <p>copyright 2026</p>
        </footer>
    </body>

    </html>
